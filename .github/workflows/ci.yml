name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv and maturin
        run: |
          pip install uv
          uv pip install maturin
      - name: Build wheel
        run: |
          maturin build --manifest-path rust_core/Cargo.toml --release --features python --strip
      - name: Install wheel
        run: |
          pip install rust_core/target/wheels/*.whl
      - name: Run tests
        run: |
          python -m unittest -v
      - name: Run benchmark
        run: |
          python benchmark.py
